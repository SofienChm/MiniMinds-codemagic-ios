workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      groups:
        - appstore_credentials
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Install Capacitor CLI and Angular CLI
        script: |
          npm install -g @angular/cli @capacitor/cli
      - name: Build Angular app
        script: |
          ng build --configuration=mobile
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.miniminds.app \
            --type IOS_APP_STORE \
            --create
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --save || \
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --save
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive
      - name: Create signed IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --archive-path ios/App/build/App.xcarchive
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
