workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.miniminds.app
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Install Capacitor CLI and Angular CLI
        script: |
          npm install -g @angular/cli @capacitor/cli
      - name: Build Angular app
        script: |
          ng build --configuration=mobile
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive
      - name: Create signed IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --archive-path ios/App/build/App.xcarchive
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
